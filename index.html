<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>冠县清廉文化人物</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"微软雅黑","宋体",serif;}
body{
    background: url("jing.jpg") no-repeat center center fixed;
    background-size: cover;
    color:#fff;
    line-height:1.8;
}
.container{max-width:900px;margin:0 auto;padding:20px;}
.header{text-align:center;padding:40px 0;margin-bottom:30px;}
.title{font-size:36px;color:#d4af37;font-weight:bold;margin-bottom:10px;text-shadow:0 0 10px #000;}
.subtitle{font-size:18px;color:#eee;text-shadow:0 0 5px #000;}

/* 人物卡片列表 */
.person-list{
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap:25px;
    margin-top:20px;
}
.person-card{
    background:rgba(0,0,0,0.7);
    border:2px solid rgba(212,175,55,0.3);
    border-radius:12px;
    overflow:hidden;
    text-align:center;
    transition:0.3s;
    cursor:pointer;
}
.person-card:hover{transform:scale(1.03);border-color:#d4af37;}
.person-card img{width:100%;height:210px;object-fit:cover;}
.person-card .name{
    padding:15px;
    font-size:18px;
    color:#d4af37;
    font-weight:bold;
}
</style>
</head>

<body>
<div class="container">
    <div class="header">
        <h1 class="title">冠县清廉文化人物</h1>
        <p class="subtitle">传承清风正气 · 弘扬廉洁精神</p>
    </div>

    <!-- 人物卡片列表 -->
    <div class="person-list">
        <!-- 钱楷 -->
        <a href="qiankai.html" style="text-decoration:none;">
            <div class="person-card">
                <img src="huabeijing.jpg" alt="钱楷">
                <div class="name">明代廉吏 · 钱楷</div>
            </div>
        </a>

        <!-- 你可以无限加人 -->
        <a href="songliangxun.html" style="text-decoration:none;">
            <div class="person-card">
                <img src="slxhx2.jpg" alt="宋良薰">
                <div class="name">清代廉吏 · 宋良薰</div>
            </div>
        </a>

        <a href="shayanxiao.html" style="text-decoration:none;">
            <div class="person-card">
                <img src="syx.jpg" alt="沙延孝">
                <div class="name">抗日英烈 · 沙延孝</div>
            </div>
        </a>
    </div>
</div>
<!-- 底部版权文字（和钱楷正文底部格式完全一样） -->
<div class="footer" style="margin-top:40px; text-align:center; padding:30px 0; border-top:2px solid #d4af37; color:#ccc; font-size:14px;">
    <p>传承廉洁家风 · 弘扬清风正气</p>
    <p>廉洁宣传专题</p>
    <p>聊城金融监管分局制作</p>
    <p>冠县金融监管支局承办</p>
    </div>
</div>
</body>
</html>
